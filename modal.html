
      <div class="modal-container modal-container-close">

        <section class="modal-content" data-test="modal">

          <form class="search-form" action="https://echo.htmlacademy.ru/" method="post">
            <div class="search-form__header">
              <h2 class="search-form__title"> Поиск гостиницы в Седоне</h2>
              <button class="search-form__close" type="button" aria-label="Закрыть форму">
                <svg class="search-form__close-svg" width="14" height="14" viewBox="0 0 14 14" fill="none"
                  xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M14 1.29231L12.7077 0L7 5.70769L1.29231 0L0 1.29231L5.70769 7L0 12.7077L1.29231 14L7 8.29231L12.7077 14L14 12.7077L8.29231 7L14 1.29231Z"
                    fill="currentColor" />
                </svg>
              </button>
            </div>

            <div class="search-form__field">
              <label class="search-form__label" for="arrival-date">Дата заезда:</label>
              <div class="search-form__control">
                <input class="search-form__date-input" type="text" id="arrival-date" name="arrival-date"
                  value="27 апреля 2020">
                <p class="search-form__message search-form__message--error">Мы не можем отправить вас в прошлое.</p>
              </div>
            </div>

            <div class="search-form__field">
              <label class="search-form__label" for="departure-date">Дата выезда:</label>
              <div class="search-form__control">
                <input class="search-form__date-input" type="text" id="departure-date" name="departure-date"
                  value="1 сентября 2021">
                <p class="search-form__message">На эти даты есть свободные номера. Пока есть.</p>
              </div>
            </div>

            <div class="search-form__guests">
              <div class="search-form__guest-row">
                <div class="search-form__guest-group">
                  <label class="search-form__label" for="adults">Взрослые:</label>
                  <div class="counter">
                    <button class="counter__button" type="button">
                      <svg class="counter__button-svg" width="20" height="20" viewBox="0 0 20 20" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 9V11H17V9H3Z" fill="currentColor" />
                      </svg>
                      <span class="visually-hidden">Уменьшить количество взрослых</span>
                    </button>
                    <input class="counter__input" type="number" id="adults" name="adults" value="2" min="0">
                    <button class="counter__button" type="button">
                      <svg class="counter__button-svg" width="20" height="20" viewBox="0 0 20 20" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 9H11V3H9V9H3V11H9V17H11V11H17V9Z" fill="currentColor" />
                      </svg>
                      <span class="visually-hidden">Увеличить количество взрослых</span>
                    </button>
                  </div>
                </div>

                <div class="search-form__guest-group search-form__guest-group--children">
                  <label class="search-form__label search-form__label--children" for="children">Дети:</label>
                  <div class="search-form__children-label-wrap">
                    <button class="info-button" type="button" aria-label="Подсказка о детях">i</button>
                    <div class="tooltip">
                      <p class="tooltip__text">
                        Укажите количество детей, которые будут с вами, возраст которых от 6 до 18 лет.
                        Дети до 6 лет размещаются бесплатно.
                      </p>
                    </div>
                  </div>

                  <div class="counter">
                    <button class="counter__button" type="button">
                      <svg class="counter__button-svg" width="20" height="20" viewBox="0 0 20 20" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 9V11H17V9H3Z" fill="currentColor" />
                      </svg>
                      <span class="visually-hidden">Уменьшить количество взрослых</span>
                    </button>
                    <input class="counter__input" type="number" id="children" name="children" value="2" min="0">
                    <button class="counter__button" type="button">
                      <svg class="counter__button-svg" width="20" height="20" viewBox="0 0 20 20" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 9H11V3H9V9H3V11H9V17H11V11H17V9Z" fill="currentColor" />
                      </svg>
                      <span class="visually-hidden">Увеличить количество взрослых</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <button class="search-form__submit" type="submit">Найти</button>
          </form>
        </section>
      </div>
    </div>
